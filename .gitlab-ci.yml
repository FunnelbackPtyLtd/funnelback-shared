include:
  - project: funnelback-rnd/gitlab-templates
    ref: main
    file: all.yml
  - project: funnelback-rnd/gitlab-templates
    ref: main
    file: security.yml
  # JDK21 Maven publish to GitLab Package Registry. Template clones gitlab-templates over HTTPS using
  # CI/CD variable GITLAB_TEMPLATES_PROJECT_TOKEN (read_repository token on that project). See publish_to_gitlab.yml.
  - project: funnelback-rnd/gitlab-templates
    ref: main
    file: publish_to_gitlab.yml

default:
  image:
    name: docker-hub.squiz.net/funnelback-rnd/gitlab-ci-docker/centos7-jdk21:latest
    entrypoint: [""]
  tags:
    - general/small

cache:
  key: "$CI_JOB_NAME"
  paths:
    - .m2/repository

stages:
  - build
  - integration
  - deploy
  - release

variables:
  # `showDateTime` will show the passed time in milliseconds. You need to specify `--batch-mode` to make this work.
  MAVEN_OPTS: >-
    -Dhttps.protocols=TLSv1.2
    -Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository
    -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=WARN
    -Dorg.slf4j.simpleLogger.showDateTime=true
    -Djava.awt.headless=true
  # As of Maven 3.6.1, the use of `--no-transfer-progress` (or `-ntp`) suppresses downloads and uploads messages.
  MAVEN_CLI_OPTS: >-
    --batch-mode
    --errors
    --show-version
    --no-transfer-progress
    --update-snapshots

.artifacts: &artifacts
  artifacts:
    expire_in: 1 hr
    paths:
      - "**/target/*"
    reports:
      junit:
        - "**/target/surefire-reports/TEST-*.xml"
        - "**/target/failsafe-reports/TEST-*.xml"

# Compile `funnelback-shared` and execute unit tests
build:
  stage: build
  # Uses default `image` (centos7-jdk21).
  script:
    - mvn $MAVEN_CLI_OPTS -fail-at-end clean install
    - rm -rf .m2/repository/com/funnelback/
  <<: *artifacts

# Verify if changes from `funnelback-shared` affect/break released plugins
