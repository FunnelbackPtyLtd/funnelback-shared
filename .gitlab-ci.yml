# GitLab SpotBugs analyzer v4/v5 runs on older JDKs and fails for release 21 projects.
# Pinning to v6 enables JDK 21 support for SpotBugs SAST scans.
spotbugs-sast:
  image:
    name: registry.gitlab.com/security-products/spotbugs:6
  variables:
    SAST_ANALYZER_IMAGE_TAG: "6"
    SAST_JAVA_VERSION: "21"
    # SpotBugs walks every pom.xml; these are templates/fixtures, not buildable projects.
    # archetype-resources: Maven archetype POM with ${groupId} etc. — fails model interpolation.
    # plugin-config-builder unit resources: minimal IT poms under src/test/resources.
    SAST_SPOTBUGS_EXCLUDED_BUILD_PATHS: "plugin-archetypes/src/main/resources/archetype-resources/pom.xml,plugin-config-builder/src/test/resources/unit/p1/pom.xml,plugin-config-builder/src/test/resources/unit/p2/pom.xml"

# Release `funnelback-shared` to the GitLab package registry (development version).
# Requires CI/CD variables: GITLAB_TEMPLATES_PROJECT_TOKEN, FUN_GITLAB_MAVEN_TOKEN (see gitlab-templates publish_to_gitlab.yml).
# Inherits before_script from the template (HTTPS clone of gitlab-templates for settings.xml).
publish_to_gitlab:
  extends:
    - .template:funnelback:mvn-publish:push:gitlab
  script:
    # Align with repo-wide MAVEN_CLI_OPTS; template default is `mvn -B clean deploy`.
    - mvn $MAVEN_CLI_OPTS clean deploy $MVN_DEPLOY_OPTIONS

# Release `funnelback-shared` to the Maven central registry (production version)
release:
  stage: release
  image:
    name: docker-hub.squiz.net/funnelback-rnd/gitlab-ci-docker/centos7-jdk21:latest
    entrypoint: [ "" ]
  extends:
    - .template:funnelback:mvn-central-publish:authenticate
  before_script:
    - getent passwd bob >/dev/null || useradd -r -m -U bob
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan -t rsa,ecdsa,ed25519 gitlab.squiz.net >> ~/.ssh/known_hosts
    - !reference ['.template:funnelback:mvn-central-publish:authenticate', before_script]
  when: manual
  only:
    - /^release-.*$/
  script:
    - SNAPSHOT_VERSION=$(mvn org.apache.maven.plugins:maven-help-plugin:3.5.1:evaluate -Dexpression=project.version -q -DforceStdout)
    - NON_SNAPSHOT_VERSION=${SNAPSHOT_VERSION%-SNAPSHOT}
    - echo "version change ${SNAPSHOT_VERSION} -> ${NON_SNAPSHOT_VERSION}"
    - mvn $MAVEN_CLI_OPTS versions:set -DnewVersion=$NON_SNAPSHOT_VERSION
    - VERSION_TEST=$(mvn org.apache.maven.plugins:maven-help-plugin:3.5.1:evaluate -Dexpression=project.version -q -DforceStdout)
    - echo "version testing $VERSION_TEST"
    - if [[ $VERSION_TEST == *"SNAPSHOT" ]]; then echo "Failed to update version to release one"; exit 1; fi
    - mvn $MAVEN_CLI_OPTS -P central-release clean deploy -Dgpg.passphrase=$GPGPASSPHRASE
    - rm -rf .m2/repository/com/funnelback/
  <<: *artifacts